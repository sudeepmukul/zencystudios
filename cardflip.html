<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Card Flip</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    font-family: 'DM Sans', sans-serif;
  }

  /* ── Wrapper ── */
  .card {
    position: relative;
    width: 280px;
    height: 320px;
    perspective: 2000px;
    cursor: pointer;
  }

  /* ── Inner rotating shell ── */
  .card__inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card:hover .card__inner {
    transform: rotateY(180deg);
  }

  /* ── Shared face ── */
  .card__face {
    position: absolute;
    inset: 0;
    border-radius: 20px;
    backface-visibility: hidden;
    border: 1px solid rgba(255,255,255,0.07);
    overflow: hidden;
  }

  /* ══════════════════════════
     FRONT
  ══════════════════════════ */
  .card__front {
    background: linear-gradient(160deg, #141414 0%, #0a0a0a 100%);
    display: flex;
    flex-direction: column;
  }

  /* orb stage */
  .card__orb-stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card__orbs {
    position: relative;
    width: 80px;
    height: 80px;
  }

  .orb {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    opacity: 0;
  }

  /* only animate when parent card is hovered */
  .card:hover .orb {
    animation: orb-pulse 2s linear infinite;
  }

  @keyframes orb-pulse {
    0%   { transform: scale(2.2); opacity: 0;   box-shadow: 0 0 40px 10px rgba(249,115,22,0.4); }
    45%  { transform: scale(1);   opacity: 1;   box-shadow: 0 6px 30px 4px  rgba(249,115,22,0.5); }
    100% { transform: scale(0.1); opacity: 0;   box-shadow: 0 10px 20px 0   rgba(249,115,22,0);   }
  }

  /* front footer */
  .card__front-footer {
    padding: 20px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px;
    background: linear-gradient(to top, #0f0f0f, transparent);
  }

  .card__front-text { display: flex; flex-direction: column; gap: 4px; }

  .card__title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.15rem;
    color: #f5f5f5;
    letter-spacing: -0.01em;
    line-height: 1.3;
    transition: transform 0.5s cubic-bezier(0.16,1,0.3,1);
  }

  .card:hover .card__title { transform: translateY(-4px); }

  .card__subtitle {
    font-size: 0.8rem;
    color: #737373;
    font-weight: 300;
    transition: transform 0.5s cubic-bezier(0.16,1,0.3,1) 50ms;
  }

  .card:hover .card__subtitle { transform: translateY(-4px); }

  /* repeat icon */
  .card__flip-icon {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: rgba(249,115,22,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.3s ease;
  }

  .card:hover .card__flip-icon { background: rgba(249,115,22,0.22); }

  .card__flip-icon svg { color: #f97316; transition: transform 0.4s ease; }
  .card:hover .card__flip-icon svg { transform: rotate(-15deg) scale(1.1); }

  /* ══════════════════════════
     BACK
  ══════════════════════════ */
  .card__back {
    transform: rotateY(180deg);
    background: linear-gradient(160deg, #141414 0%, #0a0a0a 100%);
    padding: 24px;
    display: flex;
    flex-direction: column;
  }

  .card__back-body { flex: 1; display: flex; flex-direction: column; gap: 20px; }

  .card__back-header { display: flex; flex-direction: column; gap: 6px; }

  .card__description {
    font-size: 0.8rem;
    color: #737373;
    font-weight: 300;
    line-height: 1.5;
  }

  /* features */
  .card__features { display: flex; flex-direction: column; gap: 8px; }

  .card__feature {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.82rem;
    color: #a3a3a3;
    font-weight: 300;
    transform: translateX(-12px);
    opacity: 0;
    transition: transform 0.45s cubic-bezier(0.16,1,0.3,1), opacity 0.45s ease;
  }

  /* stagger is set inline via style */
  .card:hover .card__feature {
    transform: translateX(0);
    opacity: 1;
  }

  .card__feature svg { color: #f97316; flex-shrink: 0; }

  /* back footer */
  .card__back-footer {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,0.07);
  }

  .card__cta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: -10px;
    padding: 10px;
    border-radius: 10px;
    transition: background 0.3s ease, transform 0.25s ease;
    background: transparent;
  }

  .card__cta:hover {
    background: rgba(249,115,22,0.1);
    transform: scale(1.02);
  }

  .card__cta-label {
    font-size: 0.85rem;
    font-weight: 500;
    color: #e5e5e5;
    transition: color 0.3s ease;
  }

  .card__cta:hover .card__cta-label { color: #f97316; }

  .card__cta svg {
    color: #f97316;
    transition: transform 0.25s ease;
  }

  .card__cta:hover svg { transform: translateX(3px); }
</style>
</head>
<body>

<div class="card">
  <div class="card__inner">

    <!-- FRONT -->
    <div class="card__face card__front">
      <div class="card__orb-stage">
        <div class="card__orbs" id="orbs"></div>
      </div>
      <div class="card__front-footer">
        <div class="card__front-text">
          <h3 class="card__title">Design Systems</h3>
          <p class="card__subtitle">Explore the fundamentals</p>
        </div>
        <div class="card__flip-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m17 2 4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
            <path d="m7 22-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- BACK -->
    <div class="card__face card__back">
      <div class="card__back-body">
        <div class="card__back-header">
          <h3 class="card__title">Design Systems</h3>
          <p class="card__description">Dive deep into the world of modern UI/UX design.</p>
        </div>
        <div class="card__features" id="features"></div>
      </div>
      <div class="card__back-footer">
        <div class="card__cta">
          <span class="card__cta-label">Start today</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
          </svg>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  // ── Build orbs ──
  const orbContainer = document.getElementById("orbs");
  for (let i = 0; i < 10; i++) {
    const orb = document.createElement("div");
    orb.className = "orb";
    orb.style.animationDelay = (i * 0.3) + "s";
    orbContainer.appendChild(orb);
  }

  // ── Build features ──
  const features = ["UI/UX", "Modern Design", "Tailwind CSS", "Kokonut UI"];
  const featContainer = document.getElementById("features");

  features.forEach(function(label, i) {
    const row = document.createElement("div");
    row.className = "card__feature";
    row.style.transitionDelay = (i * 90 + 150) + "ms";
    row.innerHTML =x
      '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>' +
      "<span>" + label + "</span>";
    featContainer.appendChild(row);
  });
</script>
</body>
</html>
